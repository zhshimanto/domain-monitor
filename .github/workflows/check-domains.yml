name: Check domain redirects

on:
  schedule:
    # Runs twice a day: 03:00 and 15:00 UTC. Edit these to your preferred times.
    - cron: "0 3,15 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab
  push:
    branches: [main]      # also run once when you push, so the page has data immediately

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run domain status bot
        run: python scripts/check_status.py

      - name: Commit updated status.json
        run: |
          git config user.name "domain-status-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/status.json
          git diff --staged --quiet || git commit -m "Update domain status [skip ci]"
          git push

  deploy:
    needs: check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
